<!--
  Lablio – "Your password was changed" confirmation email.

  NOTE: Supabase has NO built-in template slot for this. It must be sent by your
  own mechanism (e.g. an Edge Function + SMTP/Resend, called after a successful
  password update, or a DB trigger on auth.users). The {{ .Email }} placeholder
  only renders if sent through Supabase's template engine — if you send via a
  custom function, substitute the address yourself.

  Table-based + inline styles for max email-client compatibility. Gradients fall
  back to the solid brand color (#0077B6 / #023E8A) in clients that ignore them.
-->
<table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0"
       style="background-color:#F4F7FB;margin:0;padding:24px 12px;">
  <tr>
    <td align="center">
      <table role="presentation" width="480" cellpadding="0" cellspacing="0" border="0"
             style="width:480px;max-width:480px;background-color:#FFFFFF;border-radius:16px;overflow:hidden;
                    border:1px solid #E5E7EB;font-family:'Outfit',-apple-system,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;">

        <!-- Header: brand gradient (solid #023E8A fallback for Outlook) -->
        <tr>
          <td bgcolor="#023E8A" align="left"
              style="background-color:#023E8A;background-image:linear-gradient(135deg,#023E8A 0%,#0077B6 55%,#0096C7 100%);
                     padding:28px 32px;">
            <span style="font-size:24px;font-weight:700;color:#FFFFFF;letter-spacing:0.2px;">
              Lablio: Biomarker Tracking<span style="color:#48CAE4;">.</span>
            </span>
          </td>
        </tr>

        <!-- Body -->
        <tr>
          <td style="padding:32px 32px 8px 32px;">
            <h1 style="margin:0 0 12px 0;font-size:22px;line-height:1.3;font-weight:700;color:#1A1D23;">
              Your password was changed
            </h1>
            <p style="margin:0 0 8px 0;font-size:15px;line-height:1.6;color:#4B5563;">
              The password for your Lablio account
              (<strong style="color:#1A1D23;">{{ .Email }}</strong>) was recently changed.
              If this was you, no further action is needed.
            </p>
          </td>
        </tr>

        <!-- Divider -->
        <tr>
          <td style="padding:0 32px;">
            <div style="height:1px;background-color:#E5E7EB;line-height:1px;font-size:0;">&nbsp;</div>
          </td>
        </tr>

        <!-- Footer -->
        <tr>
          <td style="padding:20px 32px 28px 32px;">
            <p style="margin:0;font-size:12px;line-height:1.6;color:#9CA3AF;">
              This is a security notification from Lablio · Track your lab results and monitor your health.
            </p>
          </td>
        </tr>

      </table>
    </td>
  </tr>
</table>
