name: lablio
description: "Track your lab results, monitor biomarkers, and understand your health."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Backend
  supabase_flutter: ^2.8.4

  # State management
  flutter_riverpod: ^2.6.1

  # Navigation
  go_router: ^14.6.3

  # Charts
  fl_chart: ^0.70.2

  # File picker (PDF upload)
  file_picker: ^8.3.7

  # Open URLs / PDFs
  url_launcher: ^6.3.1

  # Utilities
  intl: ^0.20.2
  uuid: ^4.5.1
  shimmer: ^3.0.0
  image_picker: ^1.2.2
  shared_preferences: ^2.5.5
  local_auth: ^3.0.1
  share_plus: ^12.0.2
  path_provider: ^2.1.5
  google_mlkit_text_recognition: ^0.15.1
  printing: ^5.14.3
  syncfusion_flutter_pdf: ^33.2.8
  pdf: ^3.12.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/data/biomarkers.json

  fonts:
    - family: Outfit
      fonts:
        # Variable font (wght axis) bundled offline — no runtime download.
        - asset: assets/fonts/Outfit.ttf
