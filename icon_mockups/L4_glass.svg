<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg4" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0096C7"/><stop offset="1" stop-color="#023E8A"/>
    </linearGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.30"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0.06"/>
    </linearGradient>
    <mask id="cut4">
      <rect x="128" y="128" width="256" height="256" rx="64" fill="white"/>
      <path d="M204 178 L204 322 a6 6 0 0 0 6 6 L312 328" fill="none" stroke="black"
            stroke-width="38" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="312" cy="196" r="22" fill="black"/>
    </mask>
  </defs>
  <rect width="512" height="512" rx="120" fill="url(#bg4)"/>
  <!-- frosted glass panel with the L+dot carved out -->
  <g mask="url(#cut4)">
    <rect x="128" y="128" width="256" height="256" rx="64" fill="url(#glass)"/>
  </g>
  <!-- subtle top highlight stroke on the panel edge -->
  <rect x="128.5" y="128.5" width="255" height="255" rx="63.5" fill="none"
        stroke="#ffffff" stroke-opacity="0.35" stroke-width="1.5"/>
</svg>
